<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F3EE">
<title>My Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F7F3EE;
    --black: #111110;
    --charcoal: #2A2A28;
    --muted: #8A8780;
    --surface: #EFEBE4;
    --border: #DDD8D0;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--ivory); font-family: 'DM Sans', sans-serif; color: var(--black); min-height: 100vh; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input, textarea, button, select { font-family: 'DM Sans', sans-serif; }
  ::placeholder { color: var(--muted); opacity: 0.6; }

  /* HEADER */
  header {
    background: var(--ivory);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 0 20px;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }
  .logo-sub { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 1px; }
  .logo-main { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .btn-search {
    background: none; border: none; cursor: pointer;
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: var(--charcoal); transition: background 0.15s;
  }
  .btn-search.active { background: var(--surface); }
  .btn-add-header {
    background: var(--black); color: var(--ivory);
    border: none; border-radius: 4px;
    padding: 8px 14px; font-size: 0.72rem;
    font-weight: 600; cursor: pointer;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* SEARCH BAR */
  #searchBar { display: none; padding-bottom: 12px; animation: fadeIn 0.15s ease; }
  #searchBar.open { display: block; }
  #searchBar input {
    width: 100%; background: var(--surface); border: none;
    border-radius: 6px; padding: 10px 16px;
    font-size: 0.9rem; color: var(--black); outline: none;
  }

  /* TAG FILTER */
  .tag-filter {
    display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 12px; scrollbar-width: none;
  }
  .tag-filter-btn {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 2px;
    padding: 5px 12px; font-size: 0.65rem; cursor: pointer;
    letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
  }
  .tag-filter-btn.active {
    background: var(--black); color: var(--ivory); border-color: var(--black);
  }

  /* MAIN */
  main { padding: 0 20px 100px; max-width: 480px; margin: 0 auto; }
  .count-bar {
    padding: 20px 0 14px; display: flex; align-items: baseline; gap: 6px;
  }
  .count-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
  .count-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .divider-bold { height: 1px; background: var(--black); margin-bottom: 20px; }
  .divider-thin { height: 1px; background: var(--border); margin: 20px 0 4px; }

  /* CARD */
  .card {
    background: var(--white); border-radius: 4px; overflow: hidden;
    border: 1px solid var(--border); position: relative;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .card:active { transform: scale(0.985); box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card.featured { display: block; cursor: pointer; }
  .card.list-item { display: flex; align-items: stretch; cursor: pointer; }

  .card-thumb-featured {
    width: 100%; aspect-ratio: 4/3;
    background: linear-gradient(145deg, #EDE8E0 0%, #DDD5C8 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; position: relative;
  }
  .card-thumb-list {
    width: 88px; min-width: 88px;
    background: linear-gradient(145deg, #EDE8E0 0%, #DDD5C8 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; position: relative; flex-shrink: 0;
  }
  .thumb-emoji-lg { font-size: 3.5rem; line-height: 1; }
  .thumb-emoji-sm { font-size: 2rem; line-height: 1; }
  .thumb-domain { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.05em; }

  .badge-latest {
    position: absolute; top: 12px; left: 12px;
    background: var(--black); color: var(--ivory);
    font-size: 0.6rem; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 4px 10px;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-play {
    position: absolute; bottom: 10px; right: 10px;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--black); color: var(--ivory);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .card-body-featured { padding: 18px 20px 20px; }
  .card-body-list { padding: 12px 14px; flex: 1; min-width: 0; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .card-tag {
    display: inline-flex; align-items: center;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 2px;
    padding: 2px 7px; font-size: 0.65rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
  }
  .card-title-lg {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem; font-weight: 700;
    color: var(--black); line-height: 1.3; margin-bottom: 6px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .card-title-sm {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem; font-weight: 700;
    color: var(--black); line-height: 1.3; margin-bottom: 6px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .card-ingredients {
    font-size: 0.75rem; color: var(--muted); line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-memo { font-size: 0.75rem; color: var(--muted); line-height: 1.6; font-style: italic; margin-top: 6px; }

  .btn-delete {
    position: absolute; top: 8px; right: 8px;
    background: rgba(255,255,255,0.9); border: 1px solid var(--border);
    border-radius: 50%; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 0.65rem; color: var(--muted);
    opacity: 0; transition: opacity 0.15s;
  }
  .card:hover .btn-delete { opacity: 1; }

  /* EMPTY */
  .empty { text-align: center; padding: 80px 20px; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 16px; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--charcoal); margin-bottom: 8px; }
  .empty-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.7; }

  /* FAB */
  .fab {
    position: fixed; bottom: 28px; right: 24px;
    background: var(--black); color: var(--ivory);
    border: none; border-radius: 50%;
    width: 52px; height: 52px; font-size: 1.3rem;
    cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.93); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(17,17,16,0.6); z-index: 300;
    align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--ivory); width: 100%; max-width: 480px;
    border-radius: 16px 16px 0 0; max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: env(safe-area-inset-bottom);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }

  .modal-handle-row { display: flex; justify-content: center; padding: 14px 0 0; }
  .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }
  .modal-header { padding: 16px 28px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--black); }
  .modal-close { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--muted); padding: 4px; }
  .modal-body { padding: 24px 28px 40px; display: flex; flex-direction: column; gap: 24px; }

  .field label {
    display: block; font-size: 0.65rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
  }
  .field input, .field textarea {
    width: 100%; border: none; border-bottom: 1px solid var(--border);
    padding: 10px 0; font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif; color: var(--black);
    background: transparent; outline: none;
  }
  .field textarea { resize: none; line-height: 1.6; }

  /* TAG INPUT */
  .tag-input-wrap {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    border-bottom: 1px solid var(--border); padding-bottom: 10px;
    cursor: text; min-height: 38px;
  }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 2px; padding: 2px 7px;
    font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .tag-chip-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.65rem; padding: 0; line-height: 1; }
  #tagRealInput {
    border: none; outline: none; background: transparent;
    font-size: 0.82rem; flex: 1; min-width: 80px;
    font-family: 'DM Sans', sans-serif; color: var(--charcoal); padding: 0;
  }
  .tag-presets { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .tag-preset-btn {
    font-size: 0.7rem; color: var(--muted);
    border: 1px dashed var(--border); border-radius: 2px;
    padding: 2px 8px; cursor: pointer; background: none;
    letter-spacing: 0.06em; font-family: 'DM Sans', sans-serif;
  }

  /* EMOJI PICKER */
  .emoji-row { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 6px; }
  .emoji-opt {
    font-size: 1.5rem; cursor: pointer; padding: 4px 6px; border-radius: 4px;
    border: 1.5px solid transparent; transition: all 0.1s; background: transparent;
  }
  .emoji-opt.selected { background: var(--surface); border-color: #9E7D52; }

  .btn-save {
    width: 100%; background: var(--black); color: var(--ivory);
    border: none; border-radius: 4px; padding: 15px;
    font-size: 0.82rem; font-family: 'DM Sans', sans-serif;
    font-weight: 600; cursor: pointer;
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px;
  }
  .btn-save:active { opacity: 0.85; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="logo-sub">My</div>
      <div class="logo-main">Recipe Book</div>
    </div>
    <div class="header-actions">
      <button class="btn-search" id="btnSearch" onclick="toggleSearch()">🔍</button>
      <button class="btn-add-header" onclick="openModal()">+ 추가</button>
    </div>
  </div>
  <div id="searchBar">
    <input type="text" id="searchInput" placeholder="요리 이름, 재료로 검색..." oninput="render()">
  </div>
  <div class="tag-filter" id="tagFilter"></div>
</header>

<main id="main"></main>

<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle-row"><div class="modal-handle"></div></div>
    <div class="modal-header">
      <div class="modal-title">새 레시피</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>URL</label>
        <input type="url" id="f_url" placeholder="facebook.com/reel/...">
      </div>
      <div class="field">
        <label>요리 이름</label>
        <input type="text" id="f_title" placeholder="예: 간장계란볶음밥">
      </div>
      <div class="field">
        <label>주요 재료</label>
        <input type="text" id="f_ingredients" placeholder="예: 계란, 밥, 간장, 파">
      </div>
      <div class="field">
        <label>태그</label>
        <div class="tag-input-wrap" id="tagWrap" onclick="document.getElementById('tagRealInput').focus()">
          <input id="tagRealInput" placeholder="입력 후 Enter" onkeydown="handleTagKey(event)">
        </div>
        <div class="tag-presets" id="tagPresets"></div>
      </div>
      <div class="field">
        <label>이모지</label>
        <div class="emoji-row" id="emojiRow"></div>
      </div>
      <div class="field">
        <label>메모</label>
        <textarea id="f_memo" rows="2" placeholder="양념 비율, 팁..."></textarea>
      </div>
      <button class="btn-save" onclick="saveRecipe()">저장하기</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['🍳','🥘','🍜','🍲','🥗','🍱','🍚','🥩','🍗','🥦','🍝','🍛','🥟','🍤','🎂'];
const PRESET_TAGS = ['간단','국물','볶음','간식','15분','다이어트','손님상'];

let recipes = JSON.parse(localStorage.getItem('rr_recipes') || '[]');
let activeTag = 'all';
let currentTags = [];
let selectedEmoji = '🍳';

// ── INIT ──────────────────────────────────────────────
function init() {
  // Tag filter
  const tf = document.getElementById('tagFilter');
  ['all', ...PRESET_TAGS].forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-filter-btn' + (tag === 'all' ? ' active' : '');
    btn.textContent = tag === 'all' ? 'All' : tag;
    btn.onclick = () => {
      document.querySelectorAll('.tag-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTag = tag;
      render();
    };
    tf.appendChild(btn);
  });

  // Emoji picker
  const er = document.getElementById('emojiRow');
  EMOJIS.forEach((e, i) => {
    const el = document.createElement('span');
    el.className = 'emoji-opt' + (i === 0 ? ' selected' : '');
    el.textContent = e;
    el.onclick = () => {
      document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      selectedEmoji = e;
    };
    er.appendChild(el);
  });

  // Tag presets
  renderPresets();
  render();
}

// ── SEARCH ────────────────────────────────────────────
function toggleSearch() {
  const bar = document.getElementById('searchBar');
  const btn = document.getElementById('btnSearch');
  const isOpen = bar.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  if (isOpen) setTimeout(() => document.getElementById('searchInput').focus(), 100);
  else { document.getElementById('searchInput').value = ''; render(); }
}

// ── RENDER ────────────────────────────────────────────
function render() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filtered = recipes.filter(r => {
    const ms = !q || r.title.toLowerCase().includes(q) ||
      (r.ingredients || '').toLowerCase().includes(q) ||
      (r.tags || []).some(t => t.toLowerCase().includes(q));
    const mt = activeTag === 'all' || (r.tags || []).includes(activeTag);
    return ms && mt;
  });

  const main = document.getElementById('main');

  if (filtered.length === 0) {
    main.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🍽️</div>
        <div class="empty-title">${recipes.length === 0 ? '첫 레시피를 저장해보세요' : '검색 결과가 없어요'}</div>
        <div class="empty-desc">${recipes.length === 0 ? '+ 추가 버튼으로 릴스 URL과<br>요리 정보를 저장할 수 있어요' : '다른 키워드로 검색해보세요'}</div>
      </div>`;
    return;
  }

  const featured = filtered[0];
  const rest = filtered.slice(1);

  let html = `
    <div class="count-bar">
      <span class="count-num">${filtered.length}</span>
      <span class="count-label">Recipes</span>
    </div>
    <div class="divider-bold"></div>
    ${cardFeatured(featured)}
  `;

  if (rest.length > 0) {
    html += `<div class="divider-thin"></div>`;
    rest.forEach((r, i) => {
      html += cardList(r);
      if (i < rest.length - 1) html += `<div style="height:1px;background:var(--border)"></div>`;
    });
  }

  main.innerHTML = html;
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch { return ''; }
}

function cardFeatured(r) {
  return `
    <div class="card featured" onclick="${r.url ? `window.open('${r.url}','_blank')` : ''}">
      <div class="card-thumb-featured">
        <span class="thumb-emoji-lg">${r.emoji || '🍳'}</span>
        ${r.url ? `<span class="thumb-domain">${getDomain(r.url)}</span>` : ''}
        <div class="badge-latest">Latest</div>
        ${r.url ? `<a class="btn-play" href="${r.url}" target="_blank" onclick="event.stopPropagation()">▶</a>` : ''}
      </div>
      <div class="card-body-featured">
        ${r.tags?.length ? `<div class="card-tags">${r.tags.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="card-title-lg">${r.title}</div>
        ${r.ingredients ? `<div class="card-ingredients">${r.ingredients}</div>` : ''}
        ${r.memo ? `<div class="card-memo">"${r.memo}"</div>` : ''}
      </div>
      <button class="btn-delete" onclick="event.stopPropagation();deleteRecipe(${r.id})">✕</button>
    </div>`;
}

function cardList(r) {
  return `
    <div class="card list-item" onclick="${r.url ? `window.open('${r.url}','_blank')` : ''}">
      <div class="card-thumb-list">
        <span class="thumb-emoji-sm">${r.emoji || '🍳'}</span>
        ${r.url ? `<span class="thumb-domain">${getDomain(r.url)}</span>` : ''}
        ${r.url ? `<a class="btn-play" href="${r.url}" target="_blank" onclick="event.stopPropagation()">▶</a>` : ''}
      </div>
      <div class="card-body-list">
        ${r.tags?.length ? `<div class="card-tags">${r.tags.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="card-title-sm">${r.title}</div>
        ${r.ingredients ? `<div class="card-ingredients">${r.ingredients}</div>` : ''}
      </div>
      <button class="btn-delete" onclick="event.stopPropagation();deleteRecipe(${r.id})">✕</button>
    </div>`;
}

function deleteRecipe(id) {
  if (!confirm('삭제할까요?')) return;
  recipes = recipes.filter(r => r.id !== id);
  save(); render();
}

// ── MODAL ─────────────────────────────────────────────
function openModal() {
  document.getElementById('f_url').value = '';
  document.getElementById('f_title').value = '';
  document.getElementById('f_ingredients').value = '';
  document.getElementById('f_memo').value = '';
  currentTags = [];
  selectedEmoji = '🍳';
  document.querySelectorAll('.emoji-opt').forEach((el, i) => el.classList.toggle('selected', i === 0));
  renderTagChips();
  renderPresets();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f_title').focus(), 200);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target.id === 'modalOverlay') closeModal(); }

// ── TAGS ──────────────────────────────────────────────
function handleTagKey(e) {
  const input = document.getElementById('tagRealInput');
  if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
    e.preventDefault();
    const val = input.value.trim().replace(/^#/, '');
    if (val && !currentTags.includes(val)) { currentTags.push(val); renderTagChips(); renderPresets(); }
    input.value = '';
  } else if (e.key === 'Backspace' && !input.value && currentTags.length) {
    currentTags.pop(); renderTagChips(); renderPresets();
  }
}

function addPresetTag(tag) {
  if (!currentTags.includes(tag)) { currentTags.push(tag); renderTagChips(); renderPresets(); }
}

function renderTagChips() {
  const wrap = document.getElementById('tagWrap');
  const input = document.getElementById('tagRealInput');
  wrap.querySelectorAll('.tag-chip').forEach(el => el.remove());
  currentTags.forEach((tag, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${tag}<button class="tag-chip-remove" onclick="removeTag(${i})">✕</button>`;
    wrap.insertBefore(chip, input);
  });
  input.placeholder = currentTags.length ? '' : '입력 후 Enter';
}

function removeTag(i) { currentTags.splice(i, 1); renderTagChips(); renderPresets(); }

function renderPresets() {
  const container = document.getElementById('tagPresets');
  if (!container) return;
  container.innerHTML = '';
  PRESET_TAGS.filter(t => !currentTags.includes(t)).forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag-preset-btn';
    btn.textContent = `+ ${t}`;
    btn.onclick = () => addPresetTag(t);
    container.appendChild(btn);
  });
}

// ── SAVE ──────────────────────────────────────────────
function saveRecipe() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) { alert('요리 이름을 입력해주세요'); return; }
  const r = {
    id: Date.now(),
    url: document.getElementById('f_url').value.trim(),
    title,
    ingredients: document.getElementById('f_ingredients').value.trim(),
    tags: [...currentTags],
    emoji: selectedEmoji,
    memo: document.getElementById('f_memo').value.trim(),
  };
  recipes.unshift(r);
  save(); render(); closeModal();
}

function save() { localStorage.setItem('rr_recipes', JSON.stringify(recipes)); }

init();
</script>
</body>
